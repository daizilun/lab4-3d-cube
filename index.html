<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>3D Gradient Cube</title>
    <style>
        .scene {
            width: 200px;
            height: 200px;
            perspective: 600px;
            margin: 100px auto;
        }
        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
        }
        .cube-face {
            position: absolute;
            width: 200px;
            height: 200px;
            opacity: 0.8;
        }
        /* 正面 */
        .front {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            transform: translateZ(100px);
        }
        /* 背面 */
        .back {
            background: linear-gradient(45deg, #4834d4, #686de0);
            transform: rotateY(180deg) translateZ(100px);
        }
        /* 右侧 */
        .right {
            background: linear-gradient(45deg, #f9ca24, #f0932b);
            transform: rotateY(90deg) translateZ(100px);
        }
        /* 左侧 */
        .left {
            background: linear-gradient(45deg, #6ab04c, #badc58);
            transform: rotateY(-90deg) translateZ(100px);
        }
        /* 顶部 */
        .top {
            background: linear-gradient(45deg, #e056fd, #be2edd);
            transform: rotateX(90deg) translateZ(100px);
        }
        /* 底部 */
        .bottom {
            background: linear-gradient(45deg, #22a6b3, #30336b);
            transform: rotateX(-90deg) translateZ(100px);
        }
        /* 整体倾斜，做出3D视角 */
        .cube {
            transform: translateZ(-100px) rotateX(30deg) rotateY(45deg) skewX(10deg) skewY(5deg);
        }
    </style>
</head>
<body>
    <div class="scene">
        <div class="cube">
            <div class="cube-face front"></div>
            <div class="cube-face back"></div>
            <div class="cube-face right"></div>
            <div class="cube-face left"></div>
            <div class="cube-face top"></div>
            <div class="cube-face bottom"></div>
        </div>
    </div>
</body>
</html>
